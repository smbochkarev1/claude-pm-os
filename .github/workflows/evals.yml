name: evals

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  eval-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run eval harness (deterministic, no API key)
        run: python eval-harness/run_evals.py
